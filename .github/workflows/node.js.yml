# This workflow will do a clean installation of node dependencies, cache/restore them, build the source code and run tests across different versions of node
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-nodejs

name: Node.js CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        # electron 43's install script needs require(esm), i.e. Node >= 20.19; 26 matches the dev environment
        node-version: [26.x]
        os: [windows-latest, ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v7
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v7
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    # npm ci installs exactly the lockfile; dependency install scripts (electron,
    # @serialport/bindings-cpp, electron-winstaller) are pre-approved via the
    # allowScripts block in package.json, and postinstall applies patches/
    - run: npm ci
    - run: npm run make
    - name: Archive artifacts
      uses: actions/upload-artifact@v7
      with:
        name: ElectroTerm-${{matrix.os}}
        path: out/make
        retention-days: 1
