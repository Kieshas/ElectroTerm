<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>ElectroTerm</title>
    <link rel="stylesheet" href="../css/app.css">
    <script>
      // set theme before first paint to avoid a flash
      document.documentElement.dataset.theme =
        localStorage.theme || (matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
    </script>
    <script defer src="res/mainWin/ui.js"></script>
    <script defer src="res/mainWin/output.js"></script>
    <script defer src="res/mainWin/connection.js"></script>
    <script defer src="res/mainWin/send.js"></script>
    <script defer src="res/mainWin/panels.js"></script>
    <script defer src="res/mainWin/resizer.js"></script>
    <script defer src="res/mainWin/settings.js"></script>
  </head>
  <body class="h-screen flex flex-col bg-bg text-ink font-sans text-sm overflow-hidden">

    <!-- connection toolbar -->
    <header class="flex items-center gap-2 px-3 py-2 border-b border-edge flex-wrap">
      <div class="flex p-0.5 rounded-md border border-edge bg-panel" role="group" aria-label="Mode">
        <button type="button" class="seg" id="modeSerialBtn" aria-pressed="true">Serial</button>
        <button type="button" class="seg" id="modeTcpBtn" aria-pressed="false">TCP</button>
      </div>

      <div class="flex items-center gap-2" id="serialFields">
        <select class="field w-80" id="portSelect" title="Serial port">
          <option value="">Port…</option>
        </select>
        <select class="field w-32" id="baudSelect" title="Baud rate">
          <option value="">Baud…</option>
          <option>1200</option><option>2400</option><option>4800</option><option>9600</option>
          <option>14400</option><option>19200</option><option>28800</option><option>38400</option>
          <option>57600</option><option selected>115200</option><option>128000</option><option>230400</option>
          <option>256000</option><option>460800</option><option>921600</option>
        </select>
      </div>

      <input type="text" class="field w-28 hidden" id="tcpPortInput" placeholder="Listen port"
             maxlength="5" inputmode="numeric" title="TCP listen port">

      <button type="button" class="btn btn-primary w-28" id="connectBtn">Connect</button>

      <span class="inline-flex items-center gap-1.5 text-dim" id="statusPill">
        <span class="size-2 rounded-full bg-dim/60" id="statusDot"></span>
        <span id="statusText">Disconnected</span>
      </span>

      <span class="flex-1"></span>

      <button type="button" class="chip" id="tsBtn" aria-pressed="false" title="Prefix received lines with a timestamp">TS</button>
      <button type="button" class="chip" id="hexBtn" aria-pressed="false" title="Show received data as hex">HEX</button>
      <select class="field w-24" id="fontSelect" title="Terminal font size">
        <option>10px</option><option>11px</option><option>12px</option><option>13px</option>
        <option>14px</option><option>15px</option><option selected>16px</option><option>17px</option>
        <option>18px</option><option>19px</option><option>20px</option><option>22px</option><option>26px</option>
      </select>
      <button type="button" class="btn-ghost btn" id="themeBtn" title="Toggle light/dark theme">◐</button>
    </header>

    <!-- output tools -->
    <div class="flex items-center gap-2 px-3 py-2 border-b border-edge">
      <button type="button" class="btn" id="clearBtn">Clear</button>
      <button type="button" class="btn" id="logBtn">Log to file</button>
      <button type="button" class="btn btn-ghost" id="openFileBtn" title="Open the current log file, or the last one if logging is stopped">Open log</button>
      <span class="flex-1"></span>
      <select class="field w-28" id="scrollbackSelect" title="Lines of history kept per pane — lower is snappier">
        <option value="1000">1k lines</option>
        <option value="2000" selected>2k lines</option>
        <option value="5000">5k lines</option>
        <option value="10000">10k lines</option>
      </select>
      <button type="button" class="btn" id="filtersBtn">Filters</button>
      <button type="button" class="btn" id="autoRspBtn">Autoresponses</button>
    </div>

    <!-- terminal panes -->
    <main class="flex-1 flex min-h-0" id="outputRow">
      <div class="relative flex min-w-0" id="outputWrap" style="flex: 1 1 50%;">
        <pre class="term-pane flex-1" id="output" data-empty="Waiting for data…"></pre>
        <button type="button" id="jumpPillMain"
          class="hidden absolute bottom-3 left-1/2 -translate-x-1/2 z-10 btn bg-panel2/95 border-accent/50 text-accent shadow-lg backdrop-blur">
          Paused — jump to bottom ↓
        </button>
      </div>
      <div class="w-1 shrink-0 cursor-col-resize bg-edge hover:bg-accent/60 transition-colors" id="divider" title="Drag to resize"></div>
      <div class="relative flex min-w-0" id="outputFilteredWrap" style="flex: 1 1 50%;">
        <pre class="term-pane flex-1" id="outputFiltered" data-empty="Lines matching a filter appear here"></pre>
        <button type="button" id="jumpPillFlt"
          class="hidden absolute bottom-3 left-1/2 -translate-x-1/2 z-10 btn bg-panel2/95 border-accent/50 text-accent shadow-lg backdrop-blur">
          Paused — jump to bottom ↓
        </button>
      </div>
    </main>

    <!-- macros -->
    <div class="px-3 py-2 border-t border-edge" id="macroSection">
      <div class="grid grid-cols-[repeat(11,minmax(0,1fr))] gap-1.5" id="macroRowMain"></div>
      <div class="grid grid-cols-[repeat(12,minmax(0,1fr))] gap-1.5 mt-1.5 hidden" id="macroRowExtra"></div>
    </div>

    <!-- send row -->
    <div class="flex items-center gap-2 px-3 pb-3 pt-1" id="sendSection">
      <div class="relative flex-1 flex">
        <input type="text" class="field flex-1 rounded-r-none font-mono" id="sendText" placeholder="Type a message — Enter to send">
        <div class="absolute bottom-full left-0 right-0 mb-1 hidden max-h-64 overflow-y-auto rounded-md border border-edge bg-panel shadow-xl z-20" id="macroListPop"></div>
      </div>
      <input type="text" class="field w-24 rounded-none border-l-0" id="sendTmo" placeholder="Every ms" inputmode="numeric" title="Repeat send every N milliseconds">
      <button type="button" class="btn rounded-l-none border-l-0 w-24" id="sendBtn">Send</button>
      <button type="button" class="btn btn-ghost" id="macroListBtn" title="Insert a line from macros.txt">☰</button>
      <span class="w-px h-6 bg-edge"></span>
      <button type="button" class="chip" id="rtsBtn" aria-pressed="false" title="Toggle RTS line">RTS</button>
      <button type="button" class="chip" id="dtrBtn" aria-pressed="false" title="Toggle DTR line">DTR</button>
    </div>

    <!-- slide-over panels -->
    <div class="fixed inset-0 bg-black/40 z-30 hidden" id="panelScrim"></div>
    <aside class="panel-aside" id="sidePanel" aria-hidden="true">
      <div class="flex items-center justify-between px-4 py-3 border-b border-edge">
        <h2 class="font-medium" id="panelTitle">Filters</h2>
        <button type="button" class="btn btn-ghost" id="panelCloseBtn" title="Close (Esc)">✕</button>
      </div>
      <p class="px-4 pt-3 text-dim text-xs" id="panelHint"></p>
      <div class="flex-1 overflow-y-auto px-4 py-3 flex flex-col gap-2" id="panelRows"></div>
      <div class="flex items-center gap-2 px-4 py-3 border-t border-edge">
        <button type="button" class="btn" id="panelAddBtn">+ Add</button>
        <span class="flex-1"></span>
        <button type="button" class="btn btn-danger" id="panelClearBtn">Clear all</button>
        <button type="button" class="btn btn-primary" id="panelSaveBtn">Save</button>
      </div>
    </aside>

    <!-- toasts -->
    <div class="fixed bottom-4 right-4 z-50 flex flex-col gap-2 items-end" id="toasts"></div>

    <!-- shared two-field input dialog (macro editing) -->
    <dialog id="inputDialog" class="w-96">
      <form method="dialog" class="flex flex-col">
        <h2 class="px-4 py-3 border-b border-edge font-medium" id="dlgTitle"></h2>
        <div class="px-4 py-3 flex flex-col gap-3">
          <label class="flex flex-col gap-1 text-dim text-xs">
            <span id="dlgLabel1"></span>
            <input type="text" class="field" id="dlgInput1">
          </label>
          <label class="flex flex-col gap-1 text-dim text-xs">
            <span id="dlgLabel2"></span>
            <input type="text" class="field font-mono" id="dlgInput2">
          </label>
        </div>
        <div class="flex justify-end gap-2 px-4 py-3 border-t border-edge">
          <button type="button" class="btn" id="dlgCancel">Cancel</button>
          <button type="submit" value="submit" class="btn btn-primary" id="dlgSave">Save</button>
        </div>
      </form>
    </dialog>
  </body>
</html>
